# Docker Compose — api + redis
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - MODEL_PATH=/app/modelo.pkl
    depends_on:
      redis:
        condition: service_healthy
